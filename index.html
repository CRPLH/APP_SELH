<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE LH - Gestió de Centres</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border-top-color: #4f46e5; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .team-eap { border-left: 4px solid #4338ca; }
        .dot-eap { background-color: #4338ca; }
        .team-crp { border-left: 4px solid #d97706; }
        .dot-crp { background-color: #d97706; }
        .team-elic { border-left: 4px solid #059669; }
        .dot-elic { background-color: #059669; }
        .view-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
        .card-centre { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f3f4f6; }
        .card-centre:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border-color: #e5e7eb; }
        .dev-badge { position: fixed; top: 10px; right: 10px; background: #ef4444; color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div id="dev-mode-indicator" class="dev-badge hidden">MODE DESENVOLUPADOR</div>

    <!-- Pantalla de càrrega -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div id="spinner" class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p id="loading-text" class="text-indigo-600 font-bold leading-relaxed text-center px-6 text-sm">Sincronitzant dades...</p>
        <div id="setup-instructions" class="hidden mt-6 p-6 bg-red-50 rounded-3xl border border-red-100 max-w-sm mx-auto shadow-xl">
            <p class="text-red-700 text-sm font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-exclamation-triangle"></i> Error de connexió
            </p>
            <p id="error-details" class="text-xs text-red-600 mb-6 leading-relaxed">No es pot connectar amb la base de dades.</p>
            <button onclick="location.reload()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold text-xs hover:bg-red-700 transition-colors shadow-md">Tornar a provar</button>
        </div>
    </div>

    <!-- Login -->
    <div id="login-view" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border border-gray-100">
            <div class="bg-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8">
                <i class="fas fa-user-shield text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-800 mb-2">SE L'Hospitalet</h1>
            <p class="text-gray-500 mb-10 text-sm italic">Accés restringit a professionals EAP, CRP i ELIC</p>
            
            <button id="btn-login-google" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-4 rounded-2xl transition-all shadow-sm active:scale-95 mb-6">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6" alt="Google">
                Entra amb Google @xtec
            </button>

            <div id="dev-actions" class="hidden border-t border-dashed border-gray-200 pt-6 space-y-4">
                <p class="text-[10px] text-amber-600 font-black uppercase tracking-widest text-center">Simulació d'usuari</p>
                <div class="space-y-2">
                    <select id="dev-user-select" class="w-full p-3 bg-amber-50 border border-amber-200 rounded-xl text-xs font-bold outline-none text-amber-900">
                        <option value="">Carregant...</option>
                    </select>
                    <button id="btn-dev-login" class="w-full bg-amber-500 hover:bg-amber-600 text-white text-xs font-black py-4 rounded-2xl transition-colors shadow-md">
                        ACCEDIR
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- App Principal -->
    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b border-gray-200 sticky top-0 z-50 px-6 py-4 shadow-sm">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3 cursor-pointer" onclick="changeView('list')">
                    <div class="bg-indigo-600 p-2 rounded-xl text-white"><i class="fas fa-school"></i></div>
                    <span class="text-xl font-black text-gray-800 tracking-tighter">SE LH</span>
                </div>
                <div class="flex items-center gap-4">
                    <div id="user-badge" class="flex items-center gap-3 bg-gray-50 px-4 py-2 rounded-full border border-gray-100">
                        <div id="user-team-dot" class="w-3 h-3 rounded-full"></div>
                        <div class="text-left">
                            <p id="user-display-name" class="text-xs font-bold text-gray-700 leading-none">Usuari</p>
                            <p id="user-display-team" class="text-[9px] text-gray-400 font-bold uppercase mt-0.5 tracking-wider">...</p>
                        </div>
                    </div>
                    <button id="btn-logout" class="p-2 text-gray-300 hover:text-red-500 transition-colors"><i class="fas fa-power-off text-lg"></i></button>
                </div>
            </div>
        </header>

        <main class="flex-1 p-4 sm:p-8 max-w-4xl mx-auto w-full">
            <!-- Vista Llista -->
            <div id="view-list" class="slide-up space-y-6">
                <h2 class="text-3xl font-black text-gray-800">Els meus centresssssss</h2>
                <div class="relative group w-full">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
                    <input type="text" id="search-input" placeholder="Cerca per nom o codi..." class="w-full pl-14 pr-6 py-5 bg-white border border-gray-200 rounded-3xl shadow-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all text-lg">
                </div>
                <div id="centres-container" class="view-grid"></div>
            </div>

            <!-- Vista Detall -->
            <div id="view-detail" class="hidden slide-up space-y-6">
                <button onclick="changeView('list')" class="text-indigo-600 font-bold text-sm flex items-center gap-2 hover:underline"><i class="fas fa-arrow-left"></i> Tornar</button>
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <div id="detail-content"></div>
                    <div class="border-t border-gray-100 pt-8 mt-8">
                        <h2 class="text-2xl font-black text-gray-800 mb-6 flex items-center gap-3">
                            <i class="fas fa-history text-indigo-200"></i>
                            Historial
                        </h2>
                        <div id="history-container" class="space-y-4"></div>
                    </div>
                </div>
            </div>

            <!-- Vista Formulari -->
            <div id="view-form" class="hidden slide-up max-w-2xl mx-auto">
                <form id="intervention-form" class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100">
                    <h2 class="text-2xl font-black text-gray-800 mb-8 text-center">Registrar Actuació</h2>
                    <div id="form-nom-display" class="p-5 bg-indigo-50 rounded-2xl font-black text-indigo-900 mb-6 italic border border-indigo-100 text-center">Centre...</div>
                    <div class="space-y-1 mb-6">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase ml-2">Data</label>
                        <input type="date" id="input-date" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="space-y-1 mb-6">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase ml-2">Descripció</label>
                        <textarea id="input-text" rows="6" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Què s'ha fet avui?"></textarea>
                    </div>
                    <div class="flex gap-4">
                        <button type="button" onclick="changeView('detail')" class="flex-1 bg-gray-100 text-gray-600 font-bold py-5 rounded-2xl">Enrere</button>
                        <button type="submit" id="btn-save" class="flex-[2] bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                            <span id="save-text">Guardar</span>
                            <div id="save-loader" class="hidden loader rounded-full border-2 border-t-2 h-4 w-4 border-white"></div>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-[60]">
        <span id="toast-msg">Fet!</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQhcANb5YLX7AUS0xkA1d2ClOjC42JFo8",
            authDomain: "app-selh.firebaseapp.com",
            projectId: "app-selh",
            storageBucket: "app-selh.firebasestorage.app",
            messagingSenderId: "35717844423",
            appId: "1:35717844423:web:49611d7a7a7f3be2469de2"
        };

        const APP_ID = 'selh_hospitalet_vFINAL_PROD'; // ID renovat per evitar memòria cau de dades dolentes
        
        let db, auth, user, userData;
        let allCentres = [], professionals = [], assignacions = [], selectedCentre;
        let intervencionsCounts = {}; 
        let currentUnsubscribe = null;

        const isDev = window.location.hostname.includes('canvas') || window.location.hostname.includes('artifact');
        const BASE_PUB_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR5dqDR0ud2GyHQsuD2pArj9Sv33UQJgzpvv0alcml7kdtU5gQ_4d2HpMMDCq0B7px9nc57uCf_XSJ9/pub?output=csv';
        const GIDS = { PROFESSIONALS: '1695749152', CENTRES: '381053055', ASSIGNACIONS: '1470898946' };

        // 1. INICIALITZACIÓ CRÍTICA
        async function init() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // Esperem que l'Auth estigui llest
                onAuthStateChanged(auth, async (u) => {
                    if (u) { 
                        user = u;
                        console.log("Auth OK:", u.uid);
                        await loadData(); 
                    } else {
                        // Forçar una sessió si estem en desenvolupament per no bloquejar
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        } catch (err) {
                            hideLoader();
                            document.getElementById('login-view').classList.remove('hidden');
                        }
                    }
                });

                if (isDev) {
                    document.getElementById('dev-mode-indicator').classList.remove('hidden');
                    document.getElementById('dev-actions').classList.remove('hidden');
                }
            } catch (e) {
                showSetupError("Error d'inicialització. Refresca la pàgina.");
            }
        }

        // 2. CÀRREGA DE DADES EXTERNES (SHEETS)
        async function loadData() {
            showLoader("Sincronitzant amb el núvol...");
            try {
                const [c, p, a] = await Promise.all([
                    fetchSheet(GIDS.CENTRES), fetchSheet(GIDS.PROFESSIONALS), fetchSheet(GIDS.ASSIGNACIONS)
                ]);
                
                allCentres = c; professionals = p; assignacions = a;
                updateDevSelect(p);

                const email = (user.simulatedEmail || user.email || "").toLowerCase().trim();
                const prof = professionals.find(pr => pr.Correu?.toLowerCase().trim() === email);

                if (prof) {
                    userData = {
                        nom: prof.Nom,
                        email: email,
                        equip: (prof.Equip || 'EAP').toLowerCase(),
                        role: (prof.Rol || 'usuari').toLowerCase(),
                        assigned: assignacions.filter(asig => asig.CorreuProfessional?.toLowerCase().trim() === email).map(asig => asig.CodiCentre)
                    };
                    setupApp();
                } else if (isDev && !user.simulatedEmail) {
                    hideLoader();
                    document.getElementById('login-view').classList.remove('hidden');
                } else {
                    showSetupError(`L'usuari ${email} no té permisos.`);
                }
            } catch (e) {
                showSetupError("Error al carregar el full de càlcul.");
            }
        }

        function setupApp() {
            hideLoader();
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            document.getElementById('user-display-name').innerText = userData.nom;
            document.getElementById('user-display-team').innerText = `EQUIP ${userData.equip.toUpperCase()}`;
            document.getElementById('user-team-dot').className = `w-3 h-3 rounded-full dot-${userData.equip}`;
            
            listenGlobalIntervencions();
            renderCentres();
        }

        // 3. FIRESTORE: LECTURA EN TEMPS REAL
        function listenGlobalIntervencions() {
            // RULE 1: Path estricte
            const q = collection(db, 'artifacts', APP_ID, 'public', 'data', 'intervencions');
            onSnapshot(q, (snap) => {
                const counts = {};
                snap.docs.forEach(doc => {
                    const d = doc.data();
                    if (d.centreId) counts[d.centreId] = (counts[d.centreId] || 0) + 1;
                });
                intervencionsCounts = counts;
                renderCentres(document.getElementById('search-input').value);
            }, (err) => console.error("Error Snapshot:", err));
        }

        function renderCentres(filter = "") {
            const container = document.getElementById('centres-container');
            const isSuper = ['admin', 'superusuari'].includes(userData.role);
            
            const filtered = allCentres.filter(c => {
                const matches = c.Nom.toLowerCase().includes(filter.toLowerCase()) || c.Codi.includes(filter);
                const isAssigned = userData.assigned.includes(c.Codi);
                return (isSuper || isAssigned) && matches;
            });

            container.innerHTML = filtered.map(c => {
                const count = intervencionsCounts[c.Codi] || 0;
                return `
                <div onclick="openCentre('${c.Codi}')" class="card-centre bg-white rounded-3xl p-6 cursor-pointer flex items-center justify-between shadow-sm">
                    <div>
                        <h3 class="font-extrabold text-gray-800">${c.Nom}</h3>
                        <p class="text-[10px] font-bold mt-1 ${count > 0 ? 'text-indigo-500' : 'text-gray-300'} uppercase">
                            ${count} ${count === 1 ? 'visita' : 'visites'}
                        </p>
                    </div>
                    <i class="fas fa-chevron-right text-gray-200"></i>
                </div>`;
            }).join('');
        }

        window.openCentre = (id) => {
            selectedCentre = allCentres.find(c => c.Codi === id);
            document.getElementById('detail-content').innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-[10px] font-bold text-indigo-500 uppercase">${selectedCentre.Codi}</p>
                        <h1 class="text-3xl font-black text-gray-900">${selectedCentre.Nom}</h1>
                    </div>
                    <button onclick="changeView('form')" class="bg-indigo-600 text-white font-bold p-4 rounded-2xl shadow-lg">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>`;
            loadHistory(id);
            changeView('detail');
        };

        function loadHistory(centreId) {
            const container = document.getElementById('history-container');
            container.innerHTML = '<div class="loader mx-auto h-8 w-8 rounded-full border-2 border-t-2"></div>';
            
            if (currentUnsubscribe) currentUnsubscribe();
            const q = collection(db, 'artifacts', APP_ID, 'public', 'data', 'intervencions');
            
            currentUnsubscribe = onSnapshot(q, (snap) => {
                // RULE 2: Filtrar en JS per evitar índexs complexos
                const logs = snap.docs
                    .map(d => d.data())
                    .filter(l => l.centreId === centreId)
                    .sort((a,b) => (b.date || "").localeCompare(a.date || ""));
                
                container.innerHTML = logs.length ? logs.map(l => `
                    <div class="bg-gray-50 p-5 rounded-3xl border-l-4 team-${(l.team || 'eap').toLowerCase()} mb-3">
                        <div class="flex justify-between text-[10px] font-bold mb-2">
                            <span class="text-indigo-600">${l.date}</span>
                            <span class="text-gray-400 uppercase">${l.userName}</span>
                        </div>
                        <p class="text-sm text-gray-700 leading-relaxed">${l.text}</p>
                    </div>
                `).join('') : '<p class="text-center text-gray-400 py-6 text-sm">No hi ha registres.</p>';
            });
        }

        // 4. EL MOMENT DE LA VERITAT: GUARDAR
        document.getElementById('intervention-form').onsubmit = async (e) => {
            e.preventDefault();
            const txt = document.getElementById('input-text').value.trim();
            const dat = document.getElementById('input-date').value;

            if (!txt || !user) {
                showToast("Sessió no vàlida. Torna a entrar.");
                return;
            }

            setSaving(true);
            try {
                // Verificació extra d'auth
                if (!auth.currentUser) {
                    await signInAnonymously(auth);
                }

                // RULE 1: Path obligatori
                const collRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'intervencions');
                
                const dataToSave = {
                    centreId: selectedCentre.Codi,
                    centreNom: selectedCentre.Nom,
                    date: dat,
                    text: txt,
                    userName: userData.nom,
                    team: userData.equip,
                    userId: auth.currentUser.uid,
                    ts: serverTimestamp()
                };

                await addDoc(collRef, dataToSave);
                
                document.getElementById('input-text').value = "";
                showToast("✅ Registrat correctament!");
                changeView('detail');
            } catch (err) {
                console.error("Error Firestore:", err);
                showToast("❌ Error de permisos o connexió.");
            } finally {
                setSaving(false);
            }
        };

        // UTILITATS
        async function fetchSheet(gid) {
            const res = await fetch(`${BASE_PUB_URL}&gid=${gid}&cache=${Date.now()}`);
            const text = await res.text();
            const rows = text.trim().split(/\n/);
            const headers = rows[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            return rows.slice(1).map(row => {
                const cells = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                return headers.reduce((acc, h, i) => (acc[h] = cells[i] || "", acc), {});
            });
        }

        function showLoader(txt) {
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('loading-text').innerText = txt;
        }

        function hideLoader() {
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        function showSetupError(msg) {
            hideLoader();
            document.getElementById('spinner').classList.add('hidden');
            document.getElementById('error-details').innerText = msg;
            document.getElementById('setup-instructions').classList.remove('hidden');
            document.getElementById('loading-overlay').classList.remove('hidden');
        }

        function setSaving(isSaving) {
            const btn = document.getElementById('btn-save');
            document.getElementById('save-loader').classList.toggle('hidden', !isSaving);
            document.getElementById('save-text').innerText = isSaving ? "Guardant..." : "Guardar";
            btn.disabled = isSaving;
        }

        window.changeView = (v) => {
            ['list', 'detail', 'form'].forEach(id => document.getElementById(`view-${id}`).classList.toggle('hidden', id !== v));
        };

        function showToast(m) {
            const t = document.getElementById('toast'); 
            document.getElementById('toast-msg').innerText = m;
            t.classList.replace('opacity-0', 'opacity-100'); 
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
        }

        function updateDevSelect(profs) {
            const select = document.getElementById('dev-user-select');
            if (select) {
                select.innerHTML = '<option value="">Tria professional...</option>' + 
                    profs.sort((a,b) => a.Nom.localeCompare(b.Nom))
                         .map(p => `<option value="${p.Correu}">${p.Nom}</option>`).join('');
            }
        }

        document.getElementById('search-input').oninput = (e) => renderCentres(e.target.value);
        document.getElementById('btn-logout').onclick = () => { signOut(auth); location.reload(); };
        document.getElementById('btn-login-google').onclick = async () => {
            try {
                showLoader("Connectant...");
                await signInWithPopup(auth, new GoogleAuthProvider());
            } catch (e) {
                hideLoader();
                showToast("Login cancel·lat.");
            }
        };
        document.getElementById('btn-dev-login').onclick = async () => {
            const email = document.getElementById('dev-user-select').value;
            if (!email) return;
            user.simulatedEmail = email;
            await loadData();
        };

        window.onload = init;
    </script>
</body>
</html>
