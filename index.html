<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE LH - Gestió de Centres</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border-top-color: #4f46e5; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .team-eap { border-left: 4px solid #4338ca; }
        .dot-eap { background-color: #4338ca; }
        .team-crp { border-left: 4px solid #d97706; }
        .dot-crp { background-color: #d97706; }
        .team-elic { border-left: 4px solid #059669; }
        .dot-elic { background-color: #059669; }
        .view-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
        .card-centre { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f3f4f6; }
        .card-centre:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border-color: #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div id="spinner" class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p id="loading-text" class="text-indigo-600 font-bold leading-relaxed text-center px-6">Sincronitzant amb el núvol...</p>
    </div>

    <div id="login-view" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border border-gray-100">
            <div class="bg-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8">
                <i class="fas fa-user-shield text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-800 mb-2">SE L'Hospitalet</h1>
            <p class="text-gray-500 mb-10 text-sm">Identifica't amb el teu correu XTEC.</p>
            <input type="email" id="login-email" placeholder="usuari@xtec.cat" class="w-full p-4 mb-4 border border-gray-200 rounded-2xl text-center outline-none focus:ring-2 focus:ring-indigo-500">
            <button id="btn-login-action" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl transition-all shadow-lg active:scale-95">Accedir</button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b border-gray-200 sticky top-0 z-50 px-6 py-4 shadow-sm">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                    <div class="bg-indigo-600 p-2 rounded-xl text-white"><i class="fas fa-school"></i></div>
                    <span class="text-xl font-black text-gray-800">SE LH</span>
                </div>
                <div class="flex items-center gap-4">
                    <div id="user-badge" class="flex items-center gap-3 bg-gray-50 px-4 py-2 rounded-full border border-gray-100">
                        <div id="user-team-dot" class="w-3 h-3 rounded-full"></div>
                        <div class="text-left">
                            <p id="user-display-name" class="text-xs font-bold text-gray-700 leading-none">Usuari</p>
                            <p id="user-display-team" class="text-[9px] text-gray-400 font-bold uppercase mt-0.5 tracking-wider">...</p>
                        </div>
                    </div>
                    <button id="btn-logout" class="p-2 text-gray-300 hover:text-red-500"><i class="fas fa-power-off"></i></button>
                </div>
            </div>
        </header>

        <main class="flex-1 p-4 sm:p-8 max-w-4xl mx-auto w-full">
            <div id="view-list" class="slide-up space-y-6">
                <div>
                    <h2 class="text-3xl font-black text-gray-800">Centres</h2>
                    <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest font-bold">Base de dades activa</p>
                </div>
                <div class="relative group w-full">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
                    <input type="text" id="search-input" placeholder="Cerca pel nom del centre..." class="w-full pl-14 pr-6 py-5 bg-white border border-gray-200 rounded-3xl shadow-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all text-lg">
                </div>
                <div id="centres-container" class="view-grid"></div>
            </div>

            <div id="view-detail" class="hidden slide-up space-y-6">
                <button onclick="changeView('list')" class="text-indigo-600 font-bold text-sm flex items-center gap-2 hover:underline"><i class="fas fa-arrow-left"></i> Tornar a la llista</button>
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <div id="detail-content"></div>
                    <div class="border-t border-gray-100 pt-8 mt-8">
                        <h2 class="text-2xl font-black text-gray-800 mb-6">Historial de visites</h2>
                        <div id="history-container" class="space-y-4"></div>
                    </div>
                </div>
            </div>

            <div id="view-form" class="hidden slide-up max-w-2xl mx-auto">
                <form id="intervention-form" class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100">
                    <h2 class="text-2xl font-black text-gray-800 mb-8">Nova Intervenció</h2>
                    <div id="form-nom-display" class="p-5 bg-indigo-50 rounded-2xl font-black text-indigo-900 mb-6 italic border border-indigo-100">Centre...</div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 ml-2">Data</label>
                    <input type="date" id="input-date" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl mb-6 font-bold">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 ml-2">Detall de l'actuació</label>
                    <textarea id="input-text" rows="6" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl mb-6 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Què s'ha treballat avui?"></textarea>
                    <button type="submit" id="btn-save" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all">Sincronitzar Visita</button>
                </form>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 transition-opacity pointer-events-none z-[60]">
        <span id="toast-msg">Fet!</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓ GENERADA PEL SISTEMA
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'selh-hospitalet-v2';

        let user, userData;
        let allCentres = [], professionals = [], assignacions = [], selectedCentre;

        const BASE_PUB_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR5dqDR0ud2GyHQsuD2pArj9Sv33UQJgzpvv0alcml7kdtU5gQ_4d2HpMMDCq0B7px9nc57uCf_XSJ9/pub?output=csv';
        const GIDS = { PROFESSIONALS: '1695749152', CENTRES: '381053055', ASSIGNACIONS: '1470898946' };

        async function init() {
            // Autenticació requerida per Firestore
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, async (u) => {
                if (u) { user = u; await loadBaseData(); }
            });
        }

        async function loadBaseData() {
            try {
                const [c, p, a] = await Promise.all([
                    fetchSheet(GIDS.CENTRES), fetchSheet(GIDS.PROFESSIONALS), fetchSheet(GIDS.ASSIGNACIONS)
                ]);
                allCentres = c; professionals = p; assignacions = a;
                checkLogin();
            } catch (e) { 
                document.getElementById('loading-text').innerText = "Error en carregar centres."; 
            }
        }

        async function fetchSheet(gid) {
            const r = await fetch(`${BASE_PUB_URL}&gid=${gid}&t=${Date.now()}`);
            const t = await r.text();
            const lines = t.replace(/^\uFEFF/, '').trim().split(/\r?\n/);
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            return lines.slice(1).map(line => {
                const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/^"|"$/g, ''));
                return headers.reduce((obj, h, i) => (obj[h] = values[i] || "", obj), {});
            });
        }

        function checkLogin() {
            const email = localStorage.getItem('selh_user_email')?.toLowerCase().trim();
            const found = professionals.find(p => p.Correu?.toLowerCase().trim() === email);
            if (found) {
                userData = { 
                    nom: found.Nom, 
                    email: found.Correu, 
                    equip: (found.Equip || 'EAP').toLowerCase(), 
                    role: (found.Rol || 'usuari').toLowerCase(), 
                    assigned: assignacions.filter(a => a.CorreuProfessional?.toLowerCase().trim() === email).map(a => a.CodiCentre) 
                };
                setupUI();
            } else {
                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('login-view').classList.remove('hidden');
            }
        }

        document.getElementById('btn-login-action').onclick = () => {
            const email = document.getElementById('login-email').value.trim();
            if (email) { localStorage.setItem('selh_user_email', email); checkLogin(); }
        };

        function setupUI() {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = userData.nom;
            document.getElementById('user-display-team').innerText = `EQUIP ${userData.equip.toUpperCase()}`;
            document.getElementById('user-team-dot').className = `w-3 h-3 rounded-full dot-${userData.equip}`;
            renderCentres();
        }

        function renderCentres(filter = "") {
            const container = document.getElementById('centres-container');
            const isSuper = ['admin', 'superusuari'].includes(userData.role);
            const list = allCentres.filter(c => (isSuper || userData.assigned.includes(c.Codi)) && c.Nom.toLowerCase().includes(filter.toLowerCase()));
            container.innerHTML = list.map(c => `
                <div onclick="openCentre('${c.Codi}')" class="card-centre bg-white rounded-3xl p-6 cursor-pointer flex items-center justify-between">
                    <h3 class="font-extrabold text-gray-800">${c.Nom}</h3>
                    <i class="fas fa-chevron-right text-gray-200 text-sm"></i>
                </div>
            `).join('');
        }

        window.openCentre = (id) => {
            selectedCentre = allCentres.find(c => c.Codi === id);
            document.getElementById('detail-content').innerHTML = `
                <h1 class="text-3xl font-black text-gray-900 mb-6">${selectedCentre.Nom}</h1>
                <button onclick="changeView('form')" class="bg-indigo-600 text-white font-bold py-4 px-8 rounded-2xl w-full md:w-auto mb-6 shadow-lg">
                    <i class="fas fa-plus mr-2"></i>Registrar Nova Visita
                </button>`;
            document.getElementById('form-nom-display').innerText = selectedCentre.Nom;
            document.getElementById('input-date').valueAsDate = new Date();
            loadHistory(id);
            changeView('detail');
        };

        function loadHistory(centreId) {
            const container = document.getElementById('history-container');
            // Referència a la col·lecció pública segons la normativa del sistema
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'intervencions');
            
            onSnapshot(q, (snap) => {
                const logs = snap.docs
                    .map(d => d.data())
                    .filter(l => l.centreId === centreId)
                    .sort((a,b) => b.date.localeCompare(a.date));
                
                container.innerHTML = logs.length ? logs.map(l => `
                    <div class="bg-gray-50 p-6 rounded-3xl border-l-4 team-${l.team.toLowerCase()}">
                        <div class="flex justify-between text-[10px] font-bold text-gray-400 mb-2">
                            <span>${l.date}</span>
                            <span>${l.userName}</span>
                        </div>
                        <p class="text-gray-800 whitespace-pre-wrap leading-relaxed">${l.text}</p>
                    </div>
                `).join('') : '<p class="text-center text-gray-300 py-6 italic">Encara no hi ha visites registrades.</p>';
            }, (err) => {
                showToast("Error en connectar amb el magatzem de dades.");
            });
        }

        document.getElementById('intervention-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save'); btn.disabled = true;
            try {
                if (!user) return;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'intervencions'), {
                    centreId: selectedCentre.Codi,
                    centreNom: selectedCentre.Nom,
                    date: document.getElementById('input-date').value,
                    text: document.getElementById('input-text').value,
                    userName: userData.nom,
                    team: userData.equip,
                    userId: user.uid,
                    createdAt: serverTimestamp()
                });
                document.getElementById('input-text').value = "";
                changeView('detail');
                showToast("Sincronitzat amb èxit!");
            } catch (e) {
                showToast("Error al desar les dades.");
            } finally {
                btn.disabled = false;
            }
        };

        window.changeView = (v) => {
            ['list', 'detail', 'form'].forEach(id => document.getElementById(`view-${id}`).classList.add('hidden'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
            window.scrollTo(0,0);
        };

        function showToast(m) {
            const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = m;
            t.classList.remove('opacity-0'); setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        document.getElementById('search-input').oninput = (e) => renderCentres(e.target.value);
        document.getElementById('btn-logout').onclick = () => { localStorage.clear(); location.reload(); };

        window.onload = init;
    </script>
</body>
</html>
