<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE LH - Gestió de Centres</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border-top-color: #4f46e5; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .team-eap { border-left: 4px solid #4338ca; }
        .dot-eap { background-color: #4338ca; }
        .team-crp { border-left: 4px solid #d97706; }
        .dot-crp { background-color: #d97706; }
        .team-elic { border-left: 4px solid #059669; }
        .dot-elic { background-color: #059669; }
        .view-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
        .card-centre { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f3f4f6; }
        .card-centre:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border-color: #e5e7eb; }
        .dev-badge { position: fixed; top: 10px; right: 10px; background: #ef4444; color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div id="dev-mode-indicator" class="dev-badge hidden">MODE DESENVOLUPADOR ACTIVAT</div>

    <!-- Pantalla de càrrega -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div id="spinner" class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p id="loading-text" class="text-indigo-600 font-bold leading-relaxed text-center px-6">Carregant aplicació...</p>
        <div id="setup-instructions" class="hidden mt-6 p-6 bg-red-50 rounded-3xl border border-red-100 max-w-sm mx-auto shadow-xl">
            <p class="text-red-700 text-sm font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-exclamation-triangle"></i> Error d'accés
            </p>
            <p id="error-details" class="text-xs text-red-600 mb-6 leading-relaxed">No s'ha pogut verificar el compte.</p>
            <button onclick="location.reload()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold text-xs hover:bg-red-700 transition-colors shadow-md">Reintentar</button>
        </div>
    </div>

    <!-- Login -->
    <div id="login-view" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border border-gray-100">
            <div class="bg-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8">
                <i class="fas fa-user-shield text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-800 mb-2">SE L'Hospitalet</h1>
            <p class="text-gray-500 mb-10 text-sm">Entra amb el teu correu @xtec.cat</p>
            
            <button id="btn-login-google" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-4 rounded-2xl transition-all shadow-sm active:scale-95 mb-6">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6" alt="Google">
                Entra amb Google
            </button>

            <!-- Accions de desenvolupador -->
            <div id="dev-actions" class="hidden border-t border-dashed border-gray-200 pt-6 space-y-4">
                <p class="text-[10px] text-amber-600 font-black uppercase tracking-widest text-center">Eines de Prova</p>
                <div class="space-y-2">
                    <label class="block text-[9px] font-bold text-gray-400 uppercase text-left ml-2">Simular com a:</label>
                    <select id="dev-user-select" class="w-full p-3 bg-amber-50 border border-amber-200 rounded-xl text-xs font-bold outline-none text-amber-900">
                        <option value="">Carregant professionals...</option>
                    </select>
                    <button id="btn-dev-login" class="w-full bg-amber-500 hover:bg-amber-600 text-white text-xs font-black py-4 rounded-2xl transition-colors flex items-center justify-center gap-2 shadow-md">
                        <i class="fas fa-user-secret"></i> ACCEDIR COM A SIMULAT
                    </button>
                </div>
                <p class="text-[9px] text-gray-400 uppercase font-bold tracking-tighter text-center">Permet provar sense bloquejos de Google</p>
            </div>

            <p id="login-error-msg" class="text-red-500 text-xs font-bold mt-4 hidden"></p>
        </div>
    </div>

    <!-- App Principal -->
    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b border-gray-200 sticky top-0 z-50 px-6 py-4 shadow-sm">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                    <div class="bg-indigo-600 p-2 rounded-xl text-white"><i class="fas fa-school"></i></div>
                    <span class="text-xl font-black text-gray-800">SE LH</span>
                </div>
                <div class="flex items-center gap-4">
                    <div id="user-badge" class="flex items-center gap-3 bg-gray-50 px-4 py-2 rounded-full border border-gray-100">
                        <div id="user-team-dot" class="w-3 h-3 rounded-full"></div>
                        <div class="text-left">
                            <p id="user-display-name" class="text-xs font-bold text-gray-700 leading-none">Usuari</p>
                            <p id="user-display-team" class="text-[9px] text-gray-400 font-bold uppercase mt-0.5 tracking-wider">...</p>
                        </div>
                    </div>
                    <button id="btn-logout" class="p-2 text-gray-300 hover:text-red-500 transition-colors"><i class="fas fa-power-off"></i></button>
                </div>
            </div>
        </header>

        <main class="flex-1 p-4 sm:p-8 max-w-4xl mx-auto w-full">
            <div id="view-list" class="slide-up space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-3xl font-black text-gray-800">Centres</h2>
                </div>
                <div class="relative group w-full">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
                    <input type="text" id="search-input" placeholder="Cerca centre..." class="w-full pl-14 pr-6 py-5 bg-white border border-gray-200 rounded-3xl shadow-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all text-lg">
                </div>
                <div id="centres-container" class="view-grid"></div>
            </div>

            <div id="view-detail" class="hidden slide-up space-y-6">
                <button onclick="changeView('list')" class="text-indigo-600 font-bold text-sm flex items-center gap-2 hover:underline"><i class="fas fa-arrow-left"></i> Tornar</button>
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <div id="detail-content"></div>
                    <div class="border-t border-gray-100 pt-8 mt-8">
                        <h2 class="text-2xl font-black text-gray-800 mb-6">Historial</h2>
                        <div id="history-container" class="space-y-4 min-h-[100px]"></div>
                    </div>
                </div>
            </div>

            <div id="view-form" class="hidden slide-up max-w-2xl mx-auto">
                <form id="intervention-form" class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100">
                    <h2 class="text-2xl font-black text-gray-800 mb-8 text-center">Nova Visita</h2>
                    <div id="form-nom-display" class="p-5 bg-indigo-50 rounded-2xl font-black text-indigo-900 mb-6 italic border border-indigo-100 text-center">Centre...</div>
                    <div class="space-y-1 mb-6">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase ml-2">Data</label>
                        <input type="date" id="input-date" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="space-y-1 mb-6">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase ml-2">Resum de l'actuació</label>
                        <textarea id="input-text" rows="6" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Escriu aquí..."></textarea>
                    </div>
                    <div class="flex gap-4">
                        <button type="button" onclick="changeView('detail')" class="flex-1 bg-gray-100 text-gray-600 font-bold py-5 rounded-2xl">Cancel·lar</button>
                        <button type="submit" id="btn-save" class="flex-[2] bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                            <span id="save-text">Guardar Visita</span>
                            <div id="save-loader" class="hidden loader rounded-full border-2 border-t-2 h-4 w-4 border-white"></div>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 transition-opacity pointer-events-none z-[60]">
        <span id="toast-msg">Fet!</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQhcANb5YLX7AUS0xkA1d2ClOjC42JFo8",
            authDomain: "app-selh.firebaseapp.com",
            projectId: "app-selh",
            storageBucket: "app-selh.firebasestorage.app",
            messagingSenderId: "35717844423",
            appId: "1:35717844423:web:49611d7a7a7f3be2469de2"
        };

        const appId = 'selh-hospitalet-v2-prod';
        let db, auth, user, userData;
        let allCentres = [], professionals = [], assignacions = [], selectedCentre;
        let intervencionsCounts = {}; // Per guardar el nombre d'intervencions per centre
        let isSimulation = false;
        let currentUnsubscribe = null;
        let globalUnsubscribeIntervencions = null;

        const isIframe = window.self !== window.top;
        const isDevHost = window.location.hostname.includes('canvas') || 
                         window.location.hostname.includes('artifact') || 
                         window.location.hostname === 'localhost' ||
                         window.location.hostname === '';
        
        const isDev = isIframe || isDevHost;

        const BASE_PUB_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR5dqDR0ud2GyHQsuD2pArj9Sv33UQJgzpvv0alcml7kdtU5gQ_4d2HpMMDCq0B7px9nc57uCf_XSJ9/pub?output=csv';
        const GIDS = { PROFESSIONALS: '1695749152', CENTRES: '381053055', ASSIGNACIONS: '1470898946' };

        async function init() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                if (isDev) {
                    document.getElementById('dev-mode-indicator').classList.remove('hidden');
                    document.getElementById('dev-actions').classList.remove('hidden');
                    await preloadDevProfessionals();
                }

                onAuthStateChanged(auth, async (u) => {
                    if (u) { 
                        user = u; 
                        isSimulation = false;
                        await loadBaseData(); 
                    } else if (!isSimulation) {
                        document.getElementById('loading-overlay').classList.add('hidden');
                        document.getElementById('login-view').classList.remove('hidden');
                    }
                });
            } catch (e) {
                showSetupError("Error de connexió.");
            }
        }

        async function preloadDevProfessionals() {
            try {
                professionals = await fetchSheet(GIDS.PROFESSIONALS);
                const select = document.getElementById('dev-user-select');
                select.innerHTML = professionals
                    .sort((a,b) => a.Nom.localeCompare(b.Nom))
                    .map(p => `<option value="${p.Correu}">${p.Nom} (${p.Equip})</option>`).join('');
            } catch (e) {
                console.warn("No s'ha pogut precarregar la llista de professionals.");
            }
        }

        document.getElementById('btn-dev-login').onclick = async () => {
            const selectedEmail = document.getElementById('dev-user-select').value;
            if (!selectedEmail) return showToast("Selecciona un usuari");
            
            isSimulation = true;
            user = { email: selectedEmail, uid: 'dev-user-' + btoa(selectedEmail), displayName: 'Simulació Usuari' };
            await loadBaseData();
        };

        document.getElementById('btn-login-google').onclick = async () => {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ hd: 'xtec.cat' });
            try {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('loading-overlay').classList.remove('hidden');
                await signInWithPopup(auth, provider);
            } catch (err) {
                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('login-view').classList.remove('hidden');
                const errEl = document.getElementById('login-error-msg');
                errEl.innerText = "Error d'identificació. Fes servir el mode proves si estàs en un editor.";
                errEl.classList.remove('hidden');
            }
        };

        async function loadBaseData() {
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('loading-text').innerText = "Sincronitzant dades...";
            
            try {
                const [c, p, a] = await Promise.all([
                    fetchSheet(GIDS.CENTRES), fetchSheet(GIDS.PROFESSIONALS), fetchSheet(GIDS.ASSIGNACIONS)
                ]);
                allCentres = c; professionals = p; assignacions = a;
                
                const userEmail = user.email?.toLowerCase().trim();
                const found = professionals.find(p => p.Correu?.toLowerCase().trim() === userEmail);
                
                if (found) {
                    userData = { 
                        nom: found.Nom, 
                        email: userEmail, 
                        equip: (found.Equip || 'EAP').toLowerCase(), 
                        role: (found.Rol || 'usuari').toLowerCase(), 
                        assigned: assignacions.filter(a => a.CorreuProfessional?.toLowerCase().trim() === userEmail).map(a => a.CodiCentre) 
                    };
                    
                    // Comencem a escoltar el comptador d'intervencions abans de mostrar la UI
                    listenIntervencionsCounts();
                    setupUI();
                } else {
                    isSimulation = false;
                    if (auth.currentUser) await signOut(auth);
                    showSetupError(`El compte ${userEmail} no està registrat a la base de dades.`);
                }
            } catch (e) { 
                showSetupError("Error en la connexió amb Google Sheets."); 
            }
        }

        // Funció per escoltar totes les intervencions i comptar-les per centre
        function listenIntervencionsCounts() {
            if (globalUnsubscribeIntervencions) globalUnsubscribeIntervencions();
            
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'intervencions');
            globalUnsubscribeIntervencions = onSnapshot(q, (snap) => {
                const counts = {};
                snap.docs.forEach(doc => {
                    const data = doc.data();
                    if (data.centreId) {
                        counts[data.centreId] = (counts[data.centreId] || 0) + 1;
                    }
                });
                intervencionsCounts = counts;
                renderCentres(document.getElementById('search-input').value);
            }, (err) => {
                console.warn("Firestore count error:", err);
            });
        }

        function setupUI() {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = userData.nom;
            document.getElementById('user-display-team').innerText = `EQUIP ${userData.equip.toUpperCase()}`;
            document.getElementById('user-team-dot').className = `w-3 h-3 rounded-full dot-${userData.equip}`;
            renderCentres();
        }

        function renderCentres(filter = "") {
            const container = document.getElementById('centres-container');
            if (!container) return;

            const isSuper = ['admin', 'superusuari'].includes(userData.role);
            const list = allCentres.filter(c => (isSuper || userData.assigned.includes(c.Codi)) && c.Nom.toLowerCase().includes(filter.toLowerCase()));
            
            container.innerHTML = list.map(c => {
                const count = intervencionsCounts[c.Codi] || 0;
                const countLabel = count === 0 ? 'Sense intervencions' : (count === 1 ? '1 intervenció' : `${count} intervencions`);
                
                return `
                <div onclick="openCentre('${c.Codi}')" class="card-centre bg-white rounded-3xl p-6 cursor-pointer flex items-center justify-between">
                    <div>
                        <h3 class="font-extrabold text-gray-800 leading-tight">${c.Nom}</h3>
                        <p class="text-[10px] font-bold mt-1 ${count > 0 ? 'text-indigo-500' : 'text-gray-400 italic'} uppercase tracking-wider">${countLabel}</p>
                    </div>
                    <i class="fas fa-chevron-right text-gray-200"></i>
                </div>
                `;
            }).join('');
            
            if (list.length === 0) container.innerHTML = '<p class="text-center text-gray-400 py-10 font-medium col-span-full">No tens cap centre assignat o cap coincideix amb la cerca.</p>';
        }

        window.openCentre = (id) => {
            selectedCentre = allCentres.find(c => c.Codi === id);
            document.getElementById('detail-content').innerHTML = `
                <h1 class="text-3xl font-black text-gray-900 mb-6">${selectedCentre.Nom}</h1>
                <button onclick="changeView('form')" class="bg-indigo-600 text-white font-bold py-4 px-8 rounded-2xl w-full md:w-auto mb-6 shadow-lg hover:bg-indigo-700 transition-colors">
                    <i class="fas fa-plus mr-2"></i>Nova Intervenció
                </button>`;
            document.getElementById('form-nom-display').innerText = selectedCentre.Nom;
            document.getElementById('input-date').valueAsDate = new Date();
            loadHistory(id);
            changeView('detail');
        };

        function loadHistory(centreId) {
            const container = document.getElementById('history-container');
            container.innerHTML = '<div class="flex justify-center py-10"><div class="loader rounded-full border-2 border-t-2 h-8 w-8"></div></div>';
            
            if (currentUnsubscribe) currentUnsubscribe();

            const q = collection(db, 'artifacts', appId, 'public', 'data', 'intervencions');
            currentUnsubscribe = onSnapshot(q, (snap) => {
                const logs = snap.docs.map(d => d.data()).filter(l => l.centreId === centreId).sort((a,b) => b.date.localeCompare(a.date));
                displayLogs(logs);
            }, (err) => {
                displayLogs([], true);
            });
        }

        function displayLogs(logs, isError = false) {
            const container = document.getElementById('history-container');
            if (isError) {
                container.innerHTML = '<p class="text-center text-amber-600 py-6 text-xs font-bold bg-amber-50 rounded-2xl">Connectat en Mode Proves (Sense accés a dades reals)</p>';
                return;
            }
            container.innerHTML = logs.length ? logs.map(l => `
                <div class="bg-gray-50 p-6 rounded-3xl border-l-4 team-${l.team.toLowerCase()} slide-up mb-4">
                    <div class="flex justify-between text-[10px] font-bold text-gray-400 mb-2">
                        <span>${l.date}</span>
                        <span>${l.userName}</span>
                    </div>
                    <p class="text-gray-800 whitespace-pre-wrap leading-relaxed">${l.text}</p>
                </div>
            `).join('') : '<p class="text-center text-gray-400 py-10 font-medium bg-gray-50 rounded-3xl border border-dashed border-gray-200 italic">Sense visites registrades encara.</p>';
        }

        document.getElementById('intervention-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save'); 
            const loader = document.getElementById('save-loader');
            const textEl = document.getElementById('save-text');
            const textContent = document.getElementById('input-text').value;
            const dateContent = document.getElementById('input-date').value;
            
            if (isSimulation) {
                showToast("Dades no desades (Mode Simulació)");
                document.getElementById('input-text').value = "";
                changeView('detail');
                return;
            }

            btn.disabled = true;
            loader.classList.remove('hidden');
            textEl.innerText = "Guardant...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'intervencions'), {
                    centreId: selectedCentre.Codi, 
                    centreNom: selectedCentre.Nom, 
                    date: dateContent,
                    text: textContent, 
                    userName: userData.nom, 
                    team: userData.equip,
                    userId: user.uid, 
                    createdAt: serverTimestamp()
                });
                
                document.getElementById('input-text').value = "";
                showToast("Visita guardada!");
                changeView('detail');
                
            } catch (e) { 
                showToast("Error de connexió al guardar."); 
            } finally { 
                btn.disabled = false; 
                loader.classList.add('hidden');
                textEl.innerText = "Guardar Visita";
            }
        };

        window.changeView = (v) => {
            ['list', 'detail', 'form'].forEach(id => {
                const el = document.getElementById(`view-${id}`);
                if (id === v) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
            window.scrollTo(0,0);
        };

        async function fetchSheet(gid) {
            const r = await fetch(`${BASE_PUB_URL}&gid=${gid}&t=${Date.now()}`);
            const t = await r.text();
            const lines = t.replace(/^\uFEFF/, '').trim().split(/\r?\n/);
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            return lines.slice(1).map(line => {
                const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/^"|"$/g, ''));
                return headers.reduce((obj, h, i) => (obj[h] = values[i] || "", obj), {});
            });
        }

        function showSetupError(msg) {
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('loading-text').style.display = 'none';
            document.getElementById('error-details').innerText = msg;
            document.getElementById('setup-instructions').classList.remove('hidden');
        }

        function showToast(m) {
            const t = document.getElementById('toast'); 
            document.getElementById('toast-msg').innerText = m;
            t.classList.remove('opacity-0'); 
            setTimeout(() => t.classList.add('opacity-0'), 2500);
        }

        document.getElementById('search-input').oninput = (e) => renderCentres(e.target.value);
        document.getElementById('btn-logout').onclick = async () => { 
            isSimulation = false;
            if (currentUnsubscribe) currentUnsubscribe();
            if (globalUnsubscribeIntervencions) globalUnsubscribeIntervencions();
            if (auth.currentUser) await signOut(auth); 
            location.reload(); 
        };

        window.onload = init;
    </script>
</body>
</html>
